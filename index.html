  <link rel="apple-touch-icon" sizes="512x512" href="icons/icon-512x512.png" />

  <title>DIGI WAR</title>
  <style>
    * {
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #111;
      overflow: hidden;
      /* 使用 dvh 排除手機瀏覽器網址列 */
      height: 100dvh;
      height: 100vh; /* fallback */
      width: 100vw;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }

    /* 支援 dvh 的瀏覽器 */
    @supports (height: 100dvh) {
      body {
        height: 100dvh;
      }
    }

    #app {
      width: 100%;
      height: 100%;
    }

    /* 右上角控制列 - 直式排列 */
    #controls {
      position: fixed;
      top: 10px;
      right: 10px;
      display: none; /* 預設隱藏，轉場後才顯示 */
      flex-direction: column;
      gap: 8px;
      z-index: 1000;
    }

    #controls.visible {
      display: flex;
    }

    /* 左上角控制列 - 直式排列 */
    #left-controls {
      position: fixed;
      top: 10px;
      left: 10px;
      display: none; /* 預設隱藏，轉場後才顯示 */
      flex-direction: column;
      gap: 8px;
      z-index: 1000;
    }

    #left-controls.visible {
      display: flex;
    }

    .ctrl-btn {
      width: clamp(32px, 5vw, 44px);
      height: clamp(32px, 5vw, 44px);
      background: rgba(0, 0, 0, 0.6);
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 8px;
      color: #fff;
      font-size: clamp(14px, 2.5vw, 20px);
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: all 0.2s ease;
      text-decoration: none;
      box-sizing: border-box;
      padding: 0;
      margin: 0;
      flex-shrink: 0;
    }

    .ctrl-btn:hover {
      background: rgba(0, 0, 0, 0.8);
      border-color: rgba(255, 255, 255, 0.6);
    }

    .ctrl-btn:active {
      transform: scale(0.95);
    }

    /* 控制區共用樣式 - 直式排列 */
    .control-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: rgba(0, 0, 0, 0.6);
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 8px;
      width: clamp(32px, 5vw, 44px);
      box-sizing: border-box;
      padding: 6px 0;
      gap: 2px;
    }

    .control-btn {
      width: clamp(22px, 3.5vw, 30px);
      height: clamp(20px, 3vw, 26px);
      background: transparent;
      border: none;
      color: #fff;
      font-size: clamp(12px, 2vw, 16px);
      font-weight: bold;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: all 0.15s ease;
      border-radius: 4px;
    }

    .control-btn:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .control-btn:active {
      transform: scale(0.9);
    }

    /* 控制區數值顯示 */
    .control-value {
      font-family: monospace;
      font-size: clamp(10px, 1.5vw, 14px);
      color: #fff;
      padding: 2px 0;
    }

    /* 音量條容器 */
    #volume-bars {
      display: flex;
      flex-direction: column-reverse;
      gap: 2px;
      padding: 2px 0;
    }

    .volume-bar {
      width: clamp(16px, 2.5vw, 22px);
      height: clamp(3px, 0.5vw, 5px);
      background: rgba(255, 255, 255, 0.25);
      border-radius: 2px;
      transition: background 0.1s ease;
    }

    .volume-bar.active {
      background: #fff;
    }

    .volume-bar.muted {
      background: rgba(255, 255, 255, 0.1);
    }

    /* 全螢幕時改變圖示 */
    body.is-fullscreen #fullscreen-btn .expand-icon {
      display: none;
    }
    body.is-fullscreen #fullscreen-btn .compress-icon {
      display: block;
    }
    body:not(.is-fullscreen) #fullscreen-btn .expand-icon {
      display: block;
    }
    body:not(.is-fullscreen) #fullscreen-btn .compress-icon {
      display: none;
    }

    /* 手機版隱藏全螢幕按鈕 */
    @media screen and (max-width: 1024px) and (pointer: coarse) {
      #fullscreen-btn {
        display: none;
      }
    }

    /* 強制橫向提示 */
    #rotate-notice {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #111;
      z-index: 9999;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      color: #fff;
      font-family: Arial, sans-serif;
    }

    #rotate-notice .icon {
      font-size: clamp(48px, 15vw, 80px);
      margin-bottom: 20px;
      animation: rotate-phone 1.5s ease-in-out infinite;
    }

    #rotate-notice .text {
      font-size: clamp(14px, 4vw, 24px);
    }

    @keyframes rotate-phone {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(-90deg); }
    }

    /* 手機直向時顯示提示 */
    @media screen and (max-width: 900px) and (orientation: portrait) {
      #rotate-notice {
        display: flex;
      }
      #app {
        display: none;
      }
      #controls {
        display: none;
      }
      #left-controls {
        display: none;
      }
      #version-info {
        display: none;
      }
    }

    /* 右下角版本資訊 */
    #version-info {
      position: fixed;
      bottom: 10px;
      right: 10px;
      font-family: monospace;
      font-size: clamp(10px, 1.5vw, 14px);
      color: rgba(255, 255, 255, 0.3);
      z-index: 1000;
      pointer-events: none;
      user-select: none;
    }
  </style>

</head>

<body>
  <div id="rotate-notice">
    <div class="icon">📱</div>
    <div class="text">請將裝置轉為橫向</div>
  </div>

  <!-- 右下角版本資訊（由 JS 動態設定） -->
  <div id="version-info"></div>

  <!-- 左上角控制列（預設隱藏，轉場後顯示） -->
  <div id="left-controls">
    <!-- 回首頁按鈕 -->
    <a href="https://hwudigidev-creator.github.io/www/" class="ctrl-btn" title="回首頁"><i class="fa-solid fa-house"></i></a>
    <!-- 聯繫我們按鈕 -->
    <a href="https://hwudigidev-creator.github.io/www/#/contact" class="ctrl-btn" title="聯繫我們"><i class="fa-solid fa-envelope"></i></a>
    <!-- 分享按鈕 -->
    <button id="share-btn" class="ctrl-btn" title="分享"><i class="fa-solid fa-share-nodes"></i></button>
  </div>

  <!-- 右上角控制列（預設隱藏，轉場後顯示） -->
  <div id="controls">
    <!-- 重整按鈕 -->
    <button id="reload-btn" class="ctrl-btn" title="重新開始">↻</button>
    <!-- 網格倍率控制 -->
    <div id="grid-control" class="control-group" title="網格精細度">
      <button id="grid-up" class="control-btn">+</button>
      <span id="grid-value" class="control-value">3X</span>
      <button id="grid-down" class="control-btn">−</button>
    </div>
    <!-- 全螢幕按鈕 -->
    <button id="fullscreen-btn" class="ctrl-btn" title="全螢幕">
      <span class="expand-icon">⛶</span>
      <span class="compress-icon">⛶</span>
    </button>
    <!-- 音量控制 -->
    <div id="volume-control" class="control-group" title="音量">
      <button id="volume-up" class="control-btn">+</button>
      <div id="volume-bars"></div>
      <button id="volume-down" class="control-btn">−</button>
    </div>
  </div>

  <div id="app"></div>

  <script>
    // ===== 音量控制 =====
    const volumeBars = document.getElementById('volume-bars');
    const volumeUp = document.getElementById('volume-up');
    const volumeDown = document.getElementById('volume-down');

    const VOLUME_LEVELS = 10;
    let currentVolume = 5; // 0-10，預設 50%

    // 建立 10 個音量條
    for (let i = 0; i < VOLUME_LEVELS; i++) {
      const bar = document.createElement('div');
      bar.className = 'volume-bar';
      bar.dataset.level = i;
      volumeBars.appendChild(bar);
    }

    function updateVolumeBars() {
      const bars = volumeBars.querySelectorAll('.volume-bar');
      bars.forEach((bar, index) => {
        bar.classList.remove('active', 'muted');
        if (index < currentVolume) {
          bar.classList.add('active');
        }
      });
      // 發送音量變更事件給遊戲
      window.dispatchEvent(new CustomEvent('volumechange', { detail: { volume: currentVolume / VOLUME_LEVELS } }));
    }

    // 長按持續觸發
    let volumeInterval = null;
    const INITIAL_DELAY = 300; // 首次觸發後的延遲
    const REPEAT_DELAY = 100;  // 持續觸發的間隔

    function startVolumeUp() {
      if (currentVolume < VOLUME_LEVELS) {
        currentVolume++;
        updateVolumeBars();
      }
    }

    function startVolumeDown() {
      if (currentVolume > 0) {
        currentVolume--;
        updateVolumeBars();
      }
    }

    function startHold(action) {
      action(); // 立即觸發一次
      let firstTrigger = true;
      volumeInterval = setInterval(() => {
        if (firstTrigger) {
          firstTrigger = false;
          clearInterval(volumeInterval);
          volumeInterval = setInterval(action, REPEAT_DELAY);
        }
        action();
      }, INITIAL_DELAY);
    }

    function stopHold() {
      if (volumeInterval) {
        clearInterval(volumeInterval);
        volumeInterval = null;
      }
    }

    // 滑鼠事件
    volumeUp.addEventListener('mousedown', () => startHold(startVolumeUp));
    volumeUp.addEventListener('mouseup', stopHold);
    volumeUp.addEventListener('mouseleave', stopHold);

    volumeDown.addEventListener('mousedown', () => startHold(startVolumeDown));
    volumeDown.addEventListener('mouseup', stopHold);
    volumeDown.addEventListener('mouseleave', stopHold);

    // 觸控事件
    volumeUp.addEventListener('touchstart', (e) => {
      e.preventDefault();
      startHold(startVolumeUp);
    });
    volumeUp.addEventListener('touchend', stopHold);
    volumeUp.addEventListener('touchcancel', stopHold);

    volumeDown.addEventListener('touchstart', (e) => {
      e.preventDefault();
      startHold(startVolumeDown);
    });
    volumeDown.addEventListener('touchend', stopHold);
    volumeDown.addEventListener('touchcancel', stopHold);

    // 初始化
    updateVolumeBars();

    // ===== 全螢幕功能 =====
    const fullscreenBtn = document.getElementById('fullscreen-btn');

    function isFullscreen() {
      return !!(document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement || document.msFullscreenElement);
    }

    function updateFullscreenState() {
      if (isFullscreen()) {
        document.body.classList.add('is-fullscreen');
      } else {
        document.body.classList.remove('is-fullscreen');
      }
    }

    function toggleFullscreen() {
      if (!isFullscreen()) {
        const elem = document.documentElement;
        if (elem.requestFullscreen) {
          elem.requestFullscreen();
        } else if (elem.webkitRequestFullscreen) {
          elem.webkitRequestFullscreen();
        } else if (elem.mozRequestFullScreen) {
          elem.mozRequestFullScreen();
        } else if (elem.msRequestFullscreen) {
          elem.msRequestFullscreen();
        }
      } else {
        if (document.exitFullscreen) {
          document.exitFullscreen();
        } else if (document.webkitExitFullscreen) {
          document.webkitExitFullscreen();
        } else if (document.mozCancelFullScreen) {
          document.mozCancelFullScreen();
        } else if (document.msExitFullscreen) {
          document.msExitFullscreen();
        }
      }
    }

    fullscreenBtn.addEventListener('click', toggleFullscreen);

    document.addEventListener('fullscreenchange', updateFullscreenState);
    document.addEventListener('webkitfullscreenchange', updateFullscreenState);
    document.addEventListener('mozfullscreenchange', updateFullscreenState);
    document.addEventListener('MSFullscreenChange', updateFullscreenState);

    // ===== 重整按鈕 =====
    const reloadBtn = document.getElementById('reload-btn');
    reloadBtn.addEventListener('click', () => {
      location.reload();
    });

    // ===== 分享按鈕 =====
    const shareBtn = document.getElementById('share-btn');
    shareBtn.addEventListener('click', async () => {
      const shareData = {
        title: 'DIGI WAR',
        text: '來玩 DIGI WAR 吧！',
        url: window.location.href
      };

      if (navigator.share) {
        try {
          await navigator.share(shareData);
        } catch (err) {
          // 用戶取消分享或發生錯誤
          console.log('Share cancelled or failed:', err);
        }
      } else {
        // 不支援 Web Share API，複製連結到剪貼簿
        try {
          await navigator.clipboard.writeText(window.location.href);
          alert('連結已複製到剪貼簿！');
        } catch (err) {
          // 剪貼簿也不支援，顯示連結
          prompt('請複製此連結：', window.location.href);
        }
      }
    });

    // ===== 網格倍率控制 =====
    const gridUp = document.getElementById('grid-up');
    const gridDown = document.getElementById('grid-down');
    const gridValue = document.getElementById('grid-value');
    // 判斷是否為手機（觸控裝置且螢幕較小）
    const isMobileDevice = ('ontouchstart' in window) && window.innerWidth < 1024;
    let gridScale = isMobileDevice ? 2 : 3; // 手機預設 2X，電腦預設 3X
    gridValue.textContent = `${gridScale}X`;

    function updateGridDisplay() {
      gridValue.textContent = `${gridScale}X`;
      window.dispatchEvent(new CustomEvent('gridscalechange', { detail: { scale: gridScale } }));
    }

    gridUp.addEventListener('click', () => {
      if (gridScale < 3) {
        gridScale++;
        updateGridDisplay();
      }
    });

    gridDown.addEventListener('click', () => {
      if (gridScale > 1) {
        gridScale--;
        updateGridDisplay();
      }
    });

    // ===== 註冊 Service Worker =====
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        // 使用相對路徑，支援 GitHub Pages 子目錄部署
        const swPath = new URL('sw.js', window.location.href).href;
        navigator.serviceWorker.register(swPath)
          .then((registration) => {
            console.log('[PWA] Service Worker registered:', registration.scope);
          })
          .catch((error) => {
            console.log('[PWA] Service Worker registration failed:', error);
          });
      });
    }
  </script>

</body>
